global:
  scrape_interval: 5s
  evaluation_interval: 55s

scrape_configs:
  - job_name: "trading-backend"
    metrics_path: '/metrics'
    static_configs:
      # TODO: this expects the NestJS app to expose /metrics
      - targets: ["backend:3000"]
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']